<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BeforeGo - One Look. Then Go</title>
  <meta name="description" content="BeforeGo - One Look. Then Go. 天气与运势一体化应用">
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    :root{
      --bg-dark:#0f172a; --bg-gradient:linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      --text:#ffffff; --radius:24px;
      --glass-bg:rgba(255,255,255,.04);
      --glass-border:rgba(255,255,255,.06);
      --glass-blur:blur(20px);
      --glass-shadow:0 4px 24px rgba(0,0,0,.08);
    }
    body{
      font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background:var(--bg-gradient); color:var(--text);
      min-height:100vh; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    #weatherAnim{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .sun-halo{ position:absolute; top:7vh; right:10vw; width:230px; height:230px; border-radius:50%; background:radial-gradient(circle, rgba(255,246,181,.72), rgba(255,195,66,.28) 42%, transparent 70%); filter:blur(.2px); animation:sunPulse 5s ease-in-out infinite; }
    @keyframes sunPulse{ 0%,100%{ transform:scale(1); opacity:.8; } 50%{ transform:scale(1.08); opacity:1; } }
    .cloud{ position:absolute; border-radius:999px; background:rgba(255,255,255,.13); filter:blur(2px); animation:cloudDrift linear infinite; }
    @keyframes cloudDrift{ from{ transform:translateX(-180px); } to{ transform:translateX(calc(100vw + 240px)); } }
    .raindrop{ position:absolute; top:-30px; width:2px; border-radius:2px; background:linear-gradient(180deg, rgba(185,221,255,0), rgba(211,235,255,.62)); animation:rainFall linear infinite; }
    @keyframes rainFall{ 0%{ transform:translateY(-30px) translateX(0); opacity:0; } 8%{ opacity:1; } 100%{ transform:translateY(108vh) translateX(-34px); opacity:.18; } }
    .snowflake{ position:absolute; top:-12px; border-radius:50%; background:rgba(255,255,255,.82); animation:snowFall linear infinite; }
    @keyframes snowFall{ from{ transform:translateY(-20px) translateX(0); opacity:0; } 12%{ opacity:1; } to{ transform:translateY(108vh) translateX(38px); opacity:.28; } }
    .fog-layer{ position:absolute; width:145%; height:76px; left:-22%; border-radius:50%; background:rgba(255,255,255,.08); filter:blur(24px); animation:fogFloat ease-in-out infinite; }
    @keyframes fogFloat{ 0%,100%{ transform:translateX(-5%); opacity:.42; } 50%{ transform:translateX(5%); opacity:.72; } }
    .lightning{ position:absolute; inset:0; animation:flash 6.5s linear infinite; }
    @keyframes flash{ 0%,91%,94%,97%,100%{ background:rgba(255,255,255,0); } 92%{ background:rgba(255,255,255,.16); } 95%{ background:rgba(255,255,255,.08); } }

    .app{
      width:min(100%, 980px); margin:0 auto;
      min-height:100vh;
      padding:calc(10px + env(safe-area-inset-top, 0px)) 16px 40px;
      position:relative; z-index:2;
    }

    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .location-section{ display:flex; align-items:center; gap:8px; }
    .location-status{
      display:inline-flex; align-items:center; gap:6px; min-height:36px;
      padding:8px 14px; border-radius:999px;
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.06);
      color:rgba(255,255,255,.88); font-size:14px; font-weight:500;
      backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;
    }
    .location-status.loading{ color:rgba(255,255,255,.65); }
    .location-status.loading::after{
      content:""; width:12px; height:12px;
      border:2px solid rgba(255,255,255,.35); border-top-color:rgba(255,255,255,.9);
      border-radius:50%; animation:spin .8s linear infinite; margin-left:6px;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .refresh-btn{
      width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.06);
      color:rgba(255,255,255,.88); display:grid; place-items:center; cursor:pointer;
      transition:transform .18s ease, background .18s ease;
      backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
    }
    .refresh-btn:hover{ background:rgba(255,255,255,.12); transform:rotate(90deg); }
    .refresh-btn:active{ transform:rotate(90deg) scale(.95); }
    .search-bar{
      width:min(42vw, 280px); min-width:190px; height:40px; display:flex; align-items:center; gap:7px;
      padding:0 12px 0 15px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
    }
    .search-bar input{ flex:1; min-width:0; height:100%; border:0; outline:0; background:transparent; color:var(--text); font-size:15px; font-weight:500; }
    .search-bar input::placeholder{ color:rgba(255,255,255,.45); }
    .search-bar button{ width:24px; height:24px; border:0; border-radius:50%; background:rgba(255,255,255,.08); color:rgba(255,255,255,.85); display:grid; place-items:center; cursor:pointer; transition:transform .18s ease, background .18s ease; }
    .search-bar button:hover{ background:rgba(255,255,255,.15); transform:scale(1.04); }

    .hero{ text-align:center; padding:36px 0 32px; text-shadow:0 10px 34px rgba(0,0,0,.22); position:relative; z-index:3; }
    .city-name{ font-size:clamp(32px, 8vw, 58px); line-height:1.06; letter-spacing:-.04em; font-weight:500; }
    .temp-row{ display:flex; justify-content:center; align-items:flex-start; margin-top:10px; }
    .temp-num{ font-size:clamp(108px, 26vw, 188px); line-height:.88; font-weight:200; letter-spacing:normal; font-variant-numeric:tabular-nums; }
    .temp-degree{ font-size:clamp(32px, 7.2vw, 58px); line-height:1; font-weight:300; margin-top:22px; margin-left:2px; opacity:.78; }
    .hi-lo{ margin-top:18px; font-size:18px; color:rgba(255,255,255,.84); font-weight:600; letter-spacing:.02em; display:inline-flex; align-items:center; gap:14px; }
    .hi-lo span{ margin:0; }
    .hi-lo .sep{ color:rgba(255,255,255,.40); font-size:16px; font-weight:400; }
    .hi-lo .low{ color:rgba(255,255,255,.52); }
    .hero-advice{ margin-top:14px; font-size:15px; color:rgba(255,255,255,.58); font-weight:500; letter-spacing:.02em; }

    .status{ display:none; margin:0 auto 12px; max-width:560px; padding:10px 14px; border-radius:16px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.06); color:rgba(255,255,255,.86); font-size:13px; text-align:center; backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%); }
    .status.show{ display:block; }
    .status.error{ background:rgba(255,86,118,.12); border-color:rgba(255,134,154,.20); }
    .status.loading{ background:rgba(89,196,255,.10); border-color:rgba(153,220,255,.20); }

    .sheet{ display:grid; gap:12px; }
    .glass-card{
      position:relative; overflow:hidden; border-radius:var(--radius);
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
      backdrop-filter:blur(24px) saturate(130%); -webkit-backdrop-filter:blur(24px) saturate(130%);
    }
    .glass-card::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.02) 50%, transparent 100%);
    }
    .card-inner{ position:relative; padding:18px; }
    .card-title{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; color:rgba(255,255,255,.62); font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    .card-title span:first-child{ display:inline-flex; align-items:center; gap:7px; }
    .card-title .icon{ flex-shrink:0; opacity:.85; }
    .badge{ display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:99px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.06); color:rgba(255,255,255,.82); font-size:12px; letter-spacing:0; text-transform:none; }

    .hourly-scroll{ display:flex; gap:8px; overflow-x:auto; padding:1px 1px 4px; scroll-snap-type:x proximity; -ms-overflow-style:none; scrollbar-width:none; cursor:grab; user-select:none; }
    .hourly-scroll::-webkit-scrollbar,.forecast-list::-webkit-scrollbar{ display:none; }
    .hourly-scroll:active{ cursor:grabbing; }
    .h-item{ flex:0 0 68px; min-height:124px; border-radius:25px; padding:12px 7px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; scroll-snap-align:start; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); backdrop-filter:blur(20px) saturate(130%); -webkit-backdrop-filter:blur(20px) saturate(130%); }
    .h-item.active{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.08); }
    .ht{ font-size:13px; color:rgba(255,255,255,.76); font-weight:700; }
    .he{ font-size:26px; line-height:1; }
    .hd{ font-size:20px; font-weight:700; letter-spacing:-.04em; }
    .hr{ min-height:14px; font-size:11px; color:#9bd7ff; font-weight:700; }

    .overview-grid{ display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; }
    .metric{ min-height:92px; padding:15px; border-radius:22px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); backdrop-filter:blur(20px) saturate(130%); -webkit-backdrop-filter:blur(20px) saturate(130%); }
    .metric .label{ color:rgba(255,255,255,.56); font-size:12px; font-weight:700; letter-spacing:.04em; }
    .metric .val{ margin-top:10px; font-size:22px; font-weight:700; letter-spacing:-.04em; }
    .metric .hint{ margin-top:6px; color:rgba(255,255,255,.56); font-size:12px; line-height:1.35; }

    .forecast-list{ display:flex; flex-direction:column; gap:1px; max-height:none; }
    .forecast-item{ display:grid; grid-template-columns:88px 40px 1fr 78px; align-items:center; gap:10px; padding:12px 2px; border-top:1px solid rgba(255,255,255,.05); }
    .forecast-item:first-child{ border-top:0; }
    .f-date{ font-size:15px; font-weight:700; color:rgba(255,255,255,.88); }
    .f-emoji{ font-size:28px; text-align:center; }
    .f-desc{ font-size:13px; color:rgba(255,255,255,.62); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .f-temp{ display:flex; justify-content:flex-end; gap:12px; font-size:17px; font-weight:700; }
    .f-lo{ color:rgba(255,255,255,.52); }

    .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .aqi-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .aqi-badge{ display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border-radius:99px; font-size:13px; font-weight:800; }
    .aqi-badge[data-level="1"]{ background:rgba(52,211,153,.15); color:#7df0c1; }
    .aqi-badge[data-level="2"]{ background:rgba(251,191,36,.15); color:#ffe08a; }
    .aqi-badge[data-level="3"]{ background:rgba(251,146,60,.15); color:#ffbd86; }
    .aqi-badge[data-level="4"]{ background:rgba(251,113,133,.15); color:#ff9aad; }
    .aqi-badge[data-level="5"]{ background:rgba(239,68,68,.18); color:#ff9c9c; }
    .aqi-badge[data-level="6"]{ background:rgba(160,108,255,.20); color:#dfc7ff; }
    .aqi-meta{ color:rgba(255,255,255,.72); font-size:13px; text-align:right; }
    .aqi-visual{ position:relative; height:8px; }
    .aqi-scale{ position:relative; height:8px; border-radius:999px; background:linear-gradient(90deg, #35d39d 0%, #9bd845 18%, #f4d54d 36%, #ff9f43 54%, #ff6b57 72%, #ef4444 86%, #8b5cf6 100%); }
    .aqi-pointer{ position:absolute; top:50%; left:0; width:12px; height:12px; border-radius:50%; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.2); transform:translate(-50%, -50%); z-index:1; }
    .aqi-desc{ margin-top:12px; color:rgba(255,255,255,.68); font-size:13px; line-height:1.45; }

    .fortune-content{ display:flex; flex-direction:column; gap:14px; }
    .fortune-card-info{ display:flex; align-items:baseline; gap:10px; }
    .fortune-card-name{ font-size:24px; font-weight:700; color:rgba(255,255,255,.95); letter-spacing:-.02em; }
    .fortune-card-en{ font-size:13px; color:rgba(255,255,255,.45); font-weight:500; letter-spacing:.05em; }
    .fortune-meaning{ font-size:15px; color:rgba(255,255,255,.72); font-weight:500; line-height:1.5; }
    .fortune-keywords{ display:flex; flex-wrap:wrap; gap:8px; }
    .keyword-tag{ padding:5px 12px; border-radius:999px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); color:rgba(255,255,255,.80); font-size:12px; font-weight:600; letter-spacing:.02em; }
    .fortune-message{ padding:14px 16px; border-radius:18px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); color:rgba(255,255,255,.85); font-size:15px; line-height:1.6; font-style:italic; }
    .fortune-score-section{ display:flex; align-items:center; gap:12px; }
    .fortune-score-label{ font-size:13px; color:rgba(255,255,255,.58); font-weight:600; flex-shrink:0; }
    .fortune-score-bar-bg{ flex:1; height:8px; border-radius:999px; background:rgba(255,255,255,.05); overflow:hidden; }
    .fortune-score-bar{ height:100%; border-radius:999px; transition:width .6s ease, background .3s ease; }
    .fortune-score-value{ font-size:18px; font-weight:700; color:rgba(255,255,255,.92); min-width:40px; text-align:right; }

    footer{ padding:8px 0 4px; text-align:center; color:rgba(255,255,255,.25); font-size:10px; }

    @media (max-width:760px){
      .app{ padding-left:12px; padding-right:12px; }
      .topbar{ align-items:flex-start; }
      .location-status{ max-width:46vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13px; min-height:34px; padding:7px 12px; }
      .search-bar{ width:52vw; min-width:170px; height:38px; }
      .search-bar input{ font-size:14px; }
      .hero{ padding-top:32px; }
      .sheet{ gap:10px; }
      .overview-grid{ grid-template-columns:repeat(2, 1fr); }
      .two-col{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div id="weatherAnim"></div>
  <div class="app">
    <div class="topbar">
      <div class="location-section">
        <span class="location-status" id="locationStatus">定位中</span>
        <button class="refresh-btn" onclick="refreshWeather()" title="刷新天气">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
      <div class="search-bar">
        <input type="text" id="cityInput" placeholder="搜索城市" onkeydown="if(event.key==='Enter')searchCity()">
        <button onclick="searchCity()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
    </div>

    <div class="hero">
      <div class="city-name" id="cityName">--</div>
      <div class="temp-row">
        <span class="temp-num" id="tempNum">--</span>
        <span class="temp-degree">°</span>
      </div>
      <div class="hi-lo">
        <span id="hiTemp">--°</span>
        <span class="sep">|</span>
        <span class="low" id="loTemp">--°</span>
      </div>
      <div class="hero-advice" id="heroAdvice">--</div>
    </div>

    <div class="status" id="status"></div>

    <div class="sheet" id="sheet">
      <div class="glass-card">
        <div class="card-inner">
          <div class="card-title">
            <span><span class="icon">⛵</span>今日运势</span>
          </div>
          <div class="fortune-content" id="fortuneContent">
            <div class="fortune-card-info">
              <span class="fortune-card-name" id="fortuneName">--</span>
              <span class="fortune-card-en" id="fortuneEn">--</span>
            </div>
            <div class="fortune-keywords" id="fortuneKeywords"></div>
            <div class="fortune-message" id="fortuneMessage">--</div>
            <div class="fortune-score-section">
              <span class="fortune-score-label">运势指数</span>
              <div class="fortune-score-bar-bg">
                <div class="fortune-score-bar" id="fortuneScoreBar" style="width:0%"></div>
              </div>
              <span class="fortune-score-value" id="fortuneScoreValue">--</span>
            </div>
          </div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-inner">
          <div class="card-title">
            <span><span class="icon">⏰</span>每小时预报</span>
            <span class="badge">左右滑动</span>
          </div>
          <div class="hourly-scroll" id="hourlyScroll"></div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-inner">
          <div class="card-title">
            <span><span class="icon">🛡️</span>空气质量</span>
          </div>
          <div class="aqi-head">
            <span class="aqi-badge" id="aqiBadge" data-level="1">--</span>
            <span class="aqi-meta" id="aqiMeta"></span>
          </div>
          <div class="aqi-visual">
            <div class="aqi-scale"></div>
            <div class="aqi-pointer" id="aqiPointer" style="left:0%"></div>
          </div>
          <div class="aqi-desc" id="aqiDesc"></div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-inner">
          <div class="card-title">
            <span><span class="icon">📋</span>今日详情</span>
          </div>
          <div class="overview-grid" id="overviewGrid"></div>
        </div>
      </div>

      <div class="glass-card">
        <div class="card-inner">
          <div class="card-title">
            <span><span class="icon">📅</span>7天预报</span>
          </div>
          <div class="forecast-list" id="forecastList"></div>
        </div>
      </div>
    </div>

    <footer>BeforeGo · One Look. Then Go</footer>
  </div>

  <script>
    const STORAGE_KEY = 'beforego_weather_cache';
    let currentCity = '北京';
    let isLoading = false;

    const weatherIcons = {
      'sunny': '☀️', 'clear': '☀️', 'fair': '☀️',
      'partly-cloudy': '⛅', 'partly cloudy': '⛅', 'cloudy': '☁️',
      'overcast': '☁️', 'fog': '🌫️', 'mist': '🌫️',
      'light-rain': '🌧️', 'rain': '🌧️', 'heavy-rain': '🌧️',
      'thunderstorm': '⛈️', 'thunder': '⛈️',
      'snow': '❄️', 'light-snow': '❄️', 'heavy-snow': '❄️',
      'drizzle': '🌦️', 'shower': '🌦️',
      'hail': '🌨️', 'sleet': '🌨️',
      'wind': '💨', 'windy': '💨'
    };

    const aqiLevels = [
      { max: 50, label: '优', color: '#34d399', desc: '空气清新，适合户外活动' },
      { max: 100, label: '良', color: '#fbbf24', desc: '空气质量可接受' },
      { max: 150, label: '轻度污染', color: '#fb923c', desc: '敏感人群应减少户外活动' },
      { max: 200, label: '中度污染', color: '#fb7185', desc: '所有人应减少户外活动' },
      { max: 300, label: '重度污染', color: '#ef4444', desc: '应避免户外活动' },
      { max: 500, label: '严重污染', color: '#8b5cf6', desc: '应留在室内，避免体力消耗' }
    ];

    function getWeatherIcon(condition) {
      if (!condition) return '☀️';
      const c = condition.toLowerCase();
      for (const [key, icon] of Object.entries(weatherIcons)) {
        if (c.includes(key)) return icon;
      }
      return '☀️';
    }

    function getAqiInfo(aqi) {
      for (let i = 0; i < aqiLevels.length; i++) {
        if (aqi <= aqiLevels[i].max) {
          return { level: i + 1, ...aqiLevels[i] };
        }
      }
      return { level: 6, ...aqiLevels[5] };
    }

    function getFortuneColor(score) {
      if (score >= 80) return '#34d399';
      if (score >= 60) return '#fbbf24';
      if (score >= 40) return '#fb923c';
      return '#ef4444';
    }

    function showStatus(msg, type = 'info') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status show ${type}`;
      if (type !== 'loading') {
        setTimeout(() => el.classList.remove('show'), 4000);
      }
    }

    function hideStatus() {
      document.getElementById('status').classList.remove('show');
    }

    function render(data) {
      document.getElementById('cityName').textContent = data.city || '未知';
      document.getElementById('locationStatus').textContent = data.city || '未知';
      document.getElementById('locationStatus').classList.remove('loading');

      const current = data.current || {};
      document.getElementById('tempNum').textContent = Math.round(current.temp_c || 0);
      document.getElementById('hiTemp').textContent = `${Math.round(data.forecast?.[0]?.max_temp || 0)}°`;
      document.getElementById('loTemp').textContent = `${Math.round(data.forecast?.[0]?.min_temp || 0)}°`;
      document.getElementById('heroAdvice').textContent = current.condition || '';

      const fortune = data.fortune || {};
      document.getElementById('fortuneName').textContent = fortune.name || '--';
      document.getElementById('fortuneEn').textContent = fortune.en_name || '--';
      document.getElementById('fortuneMessage').textContent = fortune.message || '--';
      document.getElementById('fortuneScoreValue').textContent = fortune.score || '--';

      const scoreBar = document.getElementById('fortuneScoreBar');
      scoreBar.style.width = `${fortune.score || 0}%`;
      scoreBar.style.background = getFortuneColor(fortune.score || 0);

      const keywordsEl = document.getElementById('fortuneKeywords');
      keywordsEl.innerHTML = '';
      (fortune.keywords || []).forEach(k => {
        const tag = document.createElement('span');
        tag.className = 'keyword-tag';
        tag.textContent = k;
        keywordsEl.appendChild(tag);
      });

      const hourlyScroll = document.getElementById('hourlyScroll');
      hourlyScroll.innerHTML = '';
      (data.hourly || []).slice(0, 24).forEach((h, idx) => {
        const item = document.createElement('div');
        item.className = `h-item${idx === 0 ? ' active' : ''}`;
        item.innerHTML = `
          <div class="ht">${h.time}</div>
          <div class="he">${getWeatherIcon(h.condition)}</div>
          <div class="hd">${Math.round(h.temp_c)}°</div>
          <div class="hr">${h.humidity}%</div>
        `;
        hourlyScroll.appendChild(item);
      });

      const aqi = data.aqi || {};
      const aqiInfo = getAqiInfo(aqi.value || 0);
      const aqiBadge = document.getElementById('aqiBadge');
      aqiBadge.textContent = `${aqi.value || '--'} · ${aqiInfo.label}`;
      aqiBadge.setAttribute('data-level', aqiInfo.level);
      document.getElementById('aqiMeta').textContent = aqiInfo.desc;
      document.getElementById('aqiDesc').textContent = `当前 AQI ${aqi.value || '--'}，等级为${aqiInfo.label}，${aqiInfo.desc}。`;
      document.getElementById('aqiPointer').style.left = `${Math.min((aqi.value || 0) / 5, 100)}%`;

      const overviewGrid = document.getElementById('overviewGrid');
      overviewGrid.innerHTML = `
        <div class="metric">
          <div class="label">体感温度</div>
          <div class="val">${Math.round(current.feelslike_c || 0)}°</div>
          <div class="hint">Feels like</div>
        </div>
        <div class="metric">
          <div class="label">湿度</div>
          <div class="val">${current.humidity || '--'}%</div>
          <div class="hint">Humidity</div>
        </div>
        <div class="metric">
          <div class="label">风速</div>
          <div class="val">${current.wind_kph || '--'} km/h</div>
          <div class="hint">Wind</div>
        </div>
        <div class="metric">
          <div class="label">能见度</div>
          <div class="val">${current.vis_km || '--'} km</div>
          <div class="hint">Visibility</div>
        </div>
      `;

      const forecastList = document.getElementById('forecastList');
      forecastList.innerHTML = '';
      (data.forecast || []).forEach(f => {
        const item = document.createElement('div');
        item.className = 'forecast-item';
        item.innerHTML = `
          <div class="f-date">${f.date}</div>
          <div class="f-emoji">${getWeatherIcon(f.condition)}</div>
          <div class="f-desc">${f.condition || '--'}</div>
          <div class="f-temp">
            <span>${Math.round(f.max_temp)}°</span>
            <span class="f-lo">${Math.round(f.min_temp)}°</span>
          </div>
        `;
        forecastList.appendChild(item);
      });

      hideStatus();
    }

    function animateWeather(condition) {
      const container = document.getElementById('weatherAnim');
      container.innerHTML = '';

      if (!condition) return;
      const c = condition.toLowerCase();

      if (c.includes('sunny') || c.includes('clear')) {
        const sun = document.createElement('div');
        sun.className = 'sun-halo';
        container.appendChild(sun);

        for (let i = 0; i < 6; i++) {
          const cloud = document.createElement('div');
          cloud.className = 'cloud';
          cloud.style.width = `${80 + Math.random() * 60}px`;
          cloud.style.height = `${30 + Math.random() * 20}px`;
          cloud.style.top = `${10 + Math.random() * 30}%`;
          cloud.style.animationDuration = `${25 + Math.random() * 15}s`;
          cloud.style.animationDelay = `${Math.random() * 10}s`;
          container.appendChild(cloud);
        }
      } else if (c.includes('cloudy') || c.includes('overcast')) {
        for (let i = 0; i < 8; i++) {
          const cloud = document.createElement('div');
          cloud.className = 'cloud';
          cloud.style.width = `${100 + Math.random() * 80}px`;
          cloud.style.height = `${40 + Math.random() * 30}px`;
          cloud.style.top = `${5 + Math.random() * 40}%`;
          cloud.style.background = 'rgba(255,255,255,.18)';
          cloud.style.animationDuration = `${20 + Math.random() * 10}s`;
          cloud.style.animationDelay = `${Math.random() * 10}s`;
          container.appendChild(cloud);
        }
      } else if (c.includes('rain') || c.includes('drizzle') || c.includes('shower')) {
        for (let i = 0; i < 40; i++) {
          const drop = document.createElement('div');
          drop.className = 'raindrop';
          drop.style.left = `${Math.random() * 100}%`;
          drop.style.animationDuration = `${0.6 + Math.random() * 0.4}s`;
          drop.style.animationDelay = `${Math.random() * 2}s`;
          container.appendChild(drop);
        }
        const lightning = document.createElement('div');
        lightning.className = 'lightning';
        container.appendChild(lightning);
      } else if (c.includes('snow')) {
        for (let i = 0; i < 30; i++) {
          const flake = document.createElement('div');
          flake.className = 'snowflake';
          flake.style.left = `${Math.random() * 100}%`;
          flake.style.width = flake.style.height = `${4 + Math.random() * 4}px`;
          flake.style.animationDuration = `${4 + Math.random() * 4}s`;
          flake.style.animationDelay = `${Math.random() * 4}s`;
          container.appendChild(flake);
        }
      } else if (c.includes('fog') || c.includes('mist')) {
        for (let i = 0; i < 3; i++) {
          const fog = document.createElement('div');
          fog.className = 'fog-layer';
          fog.style.top = `${20 + i * 25}%`;
          fog.style.animationDelay = `${i * 2}s`;
          container.appendChild(fog);
        }
      }
    }

    async function fetchWeather(city) {
      if (isLoading) return;
      isLoading = true;
      showStatus('加载中...', 'loading');

      try {
        const resp = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
        const data = await resp.json();

        if (data.ok) {
          render(data);
          animateWeather(data.current?.condition);
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...data, timestamp: Date.now() }));
          currentCity = data.city || city;
        } else {
          showStatus(data.message || '获取天气失败', 'error');
        }
      } catch (err) {
        console.error(err);
        showStatus('网络错误，无法获取天气', 'error');
      } finally {
        isLoading = false;
      }
    }

    function searchCity() {
      const input = document.getElementById('cityInput');
      const city = input.value.trim();
      if (city) {
        fetchWeather(city);
      }
    }

    function refreshWeather() {
      document.getElementById('locationStatus').classList.add('loading');
      fetchWeather(currentCity);
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            fetchWeather(`${latitude},${longitude}`);
          },
          (err) => {
            console.error('定位失败:', err);
            fetchWeather('北京');
          },
          { timeout: 10000, maximumAge: 300000 }
        );
      } else {
        fetchWeather('北京');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const cached = localStorage.getItem(STORAGE_KEY);
      if (cached) {
        try {
          const data = JSON.parse(cached);
          if (Date.now() - data.timestamp < 3600000) {
            render(data);
            animateWeather(data.current?.condition);
          }
        } catch (e) {}
      }
      getLocation();
    });
  </script>
</body>
</html>
